name: Quant Bot Daily Scanner

on:
  schedule:
    # 1. 🌅 모닝 브리핑: 한국시간(KST) 오전 8시 50분 -> UTC 23:50 (일~목)
    - cron: '50 23 * * 0-4'
    
    # 2. ⚡ 장중 스나이퍼: 한국시간(KST) 오전 10시 30분 -> UTC 01:30 (월~금)
    - cron: '30 1 * * 1-5'

    # 3. ☁️ 클라우드 마감 스크리너: 한국시간(KST) 오후 4시 00분 -> UTC 07:00 (월~금)
    - cron: '0 7 * * 1-5'
    
  workflow_dispatch:
    inputs:
      mode:
        description: '수동 실행 모드 (morning 또는 sniper 입력)'
        required: true
        default: 'sniper'

jobs:
  bot-execution:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # app.py와 동일한 패키지 설치
        pip install requests pandas finance-datareader beautifulsoup4 google-generativeai
        
    - name: 🌅 Run Morning Briefing (오전 8시 50분)
      # 스케줄러가 '50 23 * * 0-4' 시간에 작동했거나, 수동으로 'morning'을 입력했을 때만 실행
      if: github.event.schedule == '50 23 * * 0-4' || github.event.inputs.mode == 'morning'
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python bot.py morning
      
    - name: ⚡ Run Intraday Sniper & ☁️ Closing Screener (오전 10시 30분 / 오후 4시)
      # 스케줄러가 10시 30분 또는 오후 4시에 작동했거나, 수동으로 'sniper'를 입력했을 때 실행
      if: github.event.schedule == '30 1 * * 1-5' || github.event.schedule == '0 7 * * 1-5' || github.event.inputs.mode == 'sniper' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == '')
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python bot.py sniper
