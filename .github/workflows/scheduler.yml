name: Quant Bot Scheduler

on:
  schedule:
    # 1. 모닝 브리핑: 매주 월~금, 한국 시간 아침 8시 30분 (UTC 기준 23:30)
    - cron: '30 23 * * 0-4'
    
    # 2. 장중 스크리너: 매주 월~금, 한국 시간 오후 1시 00분 (UTC 기준 04:00)
    - cron: '0 4 * * 1-5'
    
    # 3. 마감 스크리너: 매주 월~금, 한국 시간 오후 4시 00분 (UTC 기준 07:00)
    - cron: '0 7 * * 1-5'
    
  workflow_dispatch:
    inputs:
      mode:
        description: '강제 실행할 모드를 선택하세요 (morning / intraday / afternoon)'
        required: true
        default: 'morning'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 파일 불러오기
        uses: actions/checkout@v4
        
      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install pandas finance-datareader beautifulsoup4 requests google-generativeai google-cloud-firestore
          
      - name: 봇 실행 (지연 시간 100% 방어 완벽 분기)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          USER_ID: ${{ secrets.USER_ID }}
        run: |
          # 💡 [핵심 버그 수정] 서버 시간이 밀려도, 원래 배정된 '알람 이름표(Schedule)'를 추적하여 강제 실행!
          SCHEDULE="${{ github.event.schedule }}"
          MANUAL_MODE="${{ github.event.inputs.mode }}"
          
          if [ "$SCHEDULE" == "30 23 * * 0-4" ]; then
            echo "🌅 [감지] 모닝 브리핑 스케줄"
            python bot.py morning
          elif [ "$SCHEDULE" == "0 4 * * 1-5" ]; then
            echo "⚡ [감지] 장중 스크리너 스케줄"
            python bot.py intraday
          elif [ "$SCHEDULE" == "0 7 * * 1-5" ]; then
            echo "🔍 [감지] 마감 스크리너 스케줄"
            python bot.py afternoon
          elif [ -n "$MANUAL_MODE" ]; then
            echo "🖱️ [수동 실행] 사용자가 직접 $MANUAL_MODE 모드를 실행했습니다."
            python bot.py $MANUAL_MODE
          else
            echo "⚠️ 알 수 없는 트리거, 기본 마감 스크리너를 띄웁니다."
            python bot.py afternoon
          fi
